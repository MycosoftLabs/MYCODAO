name: MYCODAO CI (develop)

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

jobs:
  lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            myco-pulse/package-lock.json
      - name: Install root
        run: npm ci
      - name: Install myco-pulse (Vite build)
        run: npm ci --prefix myco-pulse
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
